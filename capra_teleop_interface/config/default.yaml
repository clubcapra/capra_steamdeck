# capra_teleop_interface — operator-side config
# Pass this file with: python -m capra_teleop_interface --config config/default.yaml
# CLI flags always override values set here.

# ---------- Rover connection ----------
host: "192.168.2.2"
port: 9101

# ---------- Controller ----------
device: "steamdeck"       # steamdeck | xbox
strategy: "arcade_drive"  # arcade_drive | tank_drive | arm_control
rate: 100.0               # Hz — control loop rate (10ms max input→send latency)
device_index: 0           # joystick index when multiple pads are connected
stick_deadzone: 0.10      # raise if robot drifts at rest; lower for more precision
trigger_deadzone: 0.02

# ---------- Haptics ----------
# no_haptics: false       # uncomment to disable rumble
torque_listen_host: "0.0.0.0"
torque_listen_port: 5006
torque_max: 50.0          # Nm that maps to full-scale rumble

# ---------- Inbound telemetry ----------
telemetry_listen_host: "0.0.0.0"
telemetry_listen_port: 7001

# ---------- Operator UI ----------
# no_ui: false
ui_host: "127.0.0.1"
ui_port: 8765
api_base_url: "http://192.168.2.2:8080"  # rove_sensor_api: E-stop + Data tab sensor proxy
ik_engine_url: "http://192.168.2.2:9101"  # rove_ik_engine: Settings tab collision toggle

# ---------- Logging ----------
log_dir: "logs"
# no_log: false
